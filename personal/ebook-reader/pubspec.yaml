name: ebook_reader
description: A full-featured e-book reader — Moon Reader clone built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Database
  drift: ^2.18.0
  drift_sqflite: any
  sqlite3_flutter_libs: ^0.5.24

  # Code generation helpers
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # E-book rendering
  epub_view: any
  pdfrx: ^1.0.70

  # Text-to-speech
  flutter_tts: ^4.0.2

  # Sensors / gestures
  sensors_plus: ^5.0.1

  # File handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  path: ^1.9.0
  archive: ^3.6.1
  image: ^3.3.0

  # Settings persistence
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Display utilities
  screen_brightness: ^0.2.2+1
  wakelock_plus: ^1.2.5

  # Sharing / export
  share_plus: ^9.0.0
  url_launcher: ^6.2.6

  # UI
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.0.3
  fl_chart: ^0.68.0

  # Network
  connectivity_plus: ^6.0.3
  http: ^1.2.1

  # Cloud sync
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  webdav_client: any

  # Page flip animation
  page_flip: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.19.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
